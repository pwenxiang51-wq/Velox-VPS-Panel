name: Velox Auto Build Arsenal

on:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出源代码
        uses: actions/checkout@v3

      - name: ⚙️ 部署 Golang 云端熔炉
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: 📦 拉取依赖库
        run: go mod tidy

      - name: ⚡ 交叉编译 Linux 极客二进制 (物理吞噬前端)
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o velox-panel main.go

      - name: 🚀 生成动态版本号
        id: tag
        run: echo "VERSION=v6.0.$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: 挂载成品至 Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: "🚀 Velox Web Panel 满血终极版 ${{ env.VERSION }}"
          files: velox-panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}